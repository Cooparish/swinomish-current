<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swinomish Channel Current Direction — La Conner Tide & Slack Water Estimator</title>
  <meta name="google-site-verification" content="lzZis3RsX4yyp3sdXJKgdm90fY5tbI0Phva54BiqDBY" />
  <meta name="description" content="Live estimated current direction for the Swinomish Channel at La Conner, WA. Uses hydraulic head between Padilla Bay and Skagit Bay to predict slack water and current direction.">
  <meta name="keywords" content="Swinomish Channel, current direction, La Conner, slack water, tide, Swinomish Slough, Skagit, boating, navigation estimate, hydraulic head">
  <meta property="og:title" content="Swinomish Channel Current Direction">
  <meta property="og:description" content="Live tide chart and estimated current direction for the Swinomish Channel at La Conner, WA. Hydraulic head model using two NOAA stations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cooparish.github.io/swinomish-current/">
  <link rel="canonical" href="https://cooparish.github.io/swinomish-current/">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #071624;
      color: #ddeef5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 1rem;
      max-width: 640px;
      margin: 0 auto;
    }

    header { text-align: center; margin-bottom: 1.2rem; }
    header h1 { font-size: 1.1rem; letter-spacing: 0.08em; color: #b0d4e8; }
    header .sub { font-size: 0.72rem; color: #4a7a8a; margin-top: 0.15rem; }

    .now-banner {
      text-align: center;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #0c1e2e;
      border: 1px solid #1b3d55;
      border-radius: 12px;
    }
    .now-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #4a7a8a; margin-bottom: 0.3rem; }
    .now-dir { font-size: 1.8rem; font-weight: 700; }
    .now-dir.north { color: #4caf50; }
    .now-dir.south { color: #ef5350; }
    .now-dir.slack { color: #42a5f5; }
    .now-dir.unknown { color: #555; }
    .now-detail { font-size: 0.78rem; color: #7aabb8; margin-top: 0.4rem; line-height: 1.5; }

    .chart-section {
      background: #0c1e2e;
      border: 1px solid #1b3d55;
      border-radius: 12px;
      padding: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .chart-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a7a8a;
      margin-bottom: 0.5rem;
    }
    .chart-wrap { position: relative; height: 240px; }

    .legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #7aabb8;
    }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .legend-line { width: 14px; height: 2px; border-radius: 1px; }

    .slack-schedule {
      background: #0c1e2e;
      border: 1px solid #1b3d55;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
    }
    .slack-schedule .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a7a8a;
      margin-bottom: 0.5rem;
    }
    .slack-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid #0f2a3a;
      font-size: 0.82rem;
    }
    .slack-item:last-child { border-bottom: none; }
    .slack-time { color: #b0d4e8; font-weight: 600; }
    .slack-detail { color: #5a8a9a; font-size: 0.75rem; }
    .slack-past { opacity: 0.4; }

    .method-section {
      background: #0c1e2e;
      border: 1px solid #1b3d55;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      font-size: 0.75rem;
      line-height: 1.7;
      color: #5a8a9a;
    }
    .method-section .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a7a8a;
      margin-bottom: 0.5rem;
    }
    .method-section p { margin-bottom: 0.5rem; }
    .method-section strong { color: #7aabb8; }

    .note {
      font-size: 0.62rem;
      color: #3a5a68;
      text-align: center;
      margin-top: 0.5rem;
      line-height: 1.6;
    }
    .note a { color: #4a7a8a; }

    .loading { text-align: center; color: #4a7a8a; padding: 3rem 1rem; }
    .error { color: #ef9a9a; text-align: center; padding: 2rem 1rem; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Swinomish Channel</h1>
  <div class="sub" id="dateLine"></div>
</header>

<div id="app">
  <p class="loading">Loading tide data from NOAA...</p>
</div>

<script>
const NORTH_STATION = '9448682';
const SOUTH_STATION = '9448558';

const SLACK_THRESHOLD = 0.05;
const TRANSITION_ZONE = 0.20;
const BAND_ALPHA = 0.45;

function parseT(s) { return new Date(s.replace(' ', 'T')).getTime(); }

function fmtTime(ms) {
  const d = new Date(ms);
  const h = d.getHours(), m = d.getMinutes();
  return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'pm' : 'am'}`;
}

function hrsMin(ms) {
  const total = Math.abs(ms);
  const h = Math.floor(total / 3600000);
  const m = Math.round((total % 3600000) / 60000);
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h} hr`;
  return `${h} hr ${m} min`;
}

async function fetchNOAA(station, interval) {
  const now = new Date();
  const d = n => { const x = new Date(now); x.setDate(x.getDate() + n); return x; };
  const fmt = x => `${x.getFullYear()}${String(x.getMonth()+1).padStart(2,'0')}${String(x.getDate()).padStart(2,'0')}`;
  const range = interval === 'hilo' ? [-2, 2] : [-1, 1];
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?` +
    `begin_date=${fmt(d(range[0]))}&end_date=${fmt(d(range[1]))}&station=${station}` +
    `&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=${interval}` +
    `&units=english&application=swinomish_head&format=json`;
  const r = await fetch(url);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.predictions;
}

function cosineInterp(hiloRaw, timePoints) {
  const hilo = hiloRaw.map(p => ({ time: parseT(p.t), height: parseFloat(p.v), type: p.type }));
  return timePoints.map(t => {
    let prev = null, next = null;
    for (let i = 0; i < hilo.length - 1; i++) {
      if (hilo[i].time <= t && hilo[i + 1].time > t) {
        prev = hilo[i];
        next = hilo[i + 1];
        break;
      }
    }
    if (!prev || !next) return null;
    const phase = Math.PI * (t - prev.time) / (next.time - prev.time);
    const h = (prev.height + next.height) / 2 + (prev.height - next.height) / 2 * Math.cos(phase);
    return { x: t, y: h };
  });
}

function computeHead(northCurve, southCurve) {
  const head = [];
  for (let i = 0; i < northCurve.length; i++) {
    if (!southCurve[i]) continue;
    head.push({ x: northCurve[i].x, y: northCurve[i].y - southCurve[i].y });
  }
  return head;
}

function findSlacks(headCurve) {
  const slacks = [];
  for (let i = 0; i < headCurve.length - 1; i++) {
    const a = headCurve[i], b = headCurve[i + 1];
    if (a.y * b.y < 0) {
      const frac = Math.abs(a.y) / (Math.abs(a.y) + Math.abs(b.y));
      const t = a.x + frac * (b.x - a.x);
      const toDir = b.y > 0 ? 'south' : 'north';
      slacks.push({ time: t, toDir });
    }
  }
  return slacks;
}

function headAt(ms, headCurve) {
  for (let i = 0; i < headCurve.length - 1; i++) {
    if (headCurve[i].x <= ms && headCurve[i + 1].x > ms) {
      const frac = (ms - headCurve[i].x) / (headCurve[i + 1].x - headCurve[i].x);
      return headCurve[i].y + frac * (headCurve[i + 1].y - headCurve[i].y);
    }
  }
  return 0;
}

function getStatus(now, headCurve, slacks) {
  const h = headAt(now, headCurve);
  const absH = Math.abs(h);

  let dir, strength, slackAmount;
  if (absH <= SLACK_THRESHOLD) {
    dir = 'slack';
    strength = 0;
    slackAmount = 1;
  } else if (absH <= TRANSITION_ZONE) {
    const t = (absH - SLACK_THRESHOLD) / (TRANSITION_ZONE - SLACK_THRESHOLD);
    dir = h > 0 ? 'south' : 'north';
    strength = t;
    slackAmount = 1 - t;
  } else {
    dir = h > 0 ? 'south' : 'north';
    strength = 1;
    slackAmount = 0;
  }

  const maxH = headCurve.reduce((mx, p) => Math.max(mx, Math.abs(p.y)), 0);
  const relStrength = maxH > 0 ? absH / maxH : 0;

  let nextSlack = null, prevSlack = null;
  for (const s of slacks) {
    if (s.time > now && !nextSlack) nextSlack = s;
    if (s.time <= now) prevSlack = s;
  }

  return { dir, strength, slackAmount, head: h, relStrength, nextSlack, prevSlack };
}

function render(northCurve, southCurve, headCurve, slacks) {
  const now = Date.now();
  const today = new Date(now);
  const dayStart = new Date(today); dayStart.setHours(0, 0, 0, 0);
  const dayEnd = new Date(today); dayEnd.setHours(23, 59, 59, 999);
  const dsMs = dayStart.getTime(), deMs = dayEnd.getTime();

  const status = getStatus(now, headCurve, slacks);
  const displayDir = status.slackAmount >= 0.7 ? 'slack' : status.dir;
  const labels = { north: 'Flooding North', south: 'Ebbing South', slack: 'Slack Water', unknown: '—' };
  const arrows = { north: '↑', south: '↓', slack: '↔', unknown: '' };

  let detailText = '';
  if (status.nextSlack) {
    const until = status.nextSlack.time - now;
    const toLabel = status.nextSlack.toDir === 'north' ? 'north flood' : 'south ebb';
    detailText = `Next slack in ${hrsMin(until)} (${fmtTime(status.nextSlack.time)}) → ${toLabel}`;
  }
  if (displayDir !== 'slack' && status.relStrength > 0) {
    const strengthLabel = status.relStrength > 0.7 ? 'Strong' : status.relStrength > 0.35 ? 'Moderate' : 'Weak';
    detailText = `${strengthLabel} current` + (detailText ? `<br>${detailText}` : '');
  }

  document.getElementById('dateLine').textContent =
    today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + '  ·  ' + fmtTime(now);

  const todaySlacks = slacks.filter(s => s.time >= dsMs && s.time <= deMs);
  const slackItems = todaySlacks.map(s => {
    const past = s.time < now;
    const toLabel = s.toDir === 'north' ? 'then north flood' : 'then south ebb';
    return `<div class="slack-item${past ? ' slack-past' : ''}">
      <span class="slack-time">${fmtTime(s.time)}</span>
      <span class="slack-detail">${toLabel}</span>
    </div>`;
  }).join('');

  const todayNorth = northCurve.filter(p => p.x >= dsMs && p.x <= deMs);
  const todaySouth = southCurve.filter(p => p && p.x >= dsMs && p.x <= deMs);

  document.getElementById('app').innerHTML = `
    <div class="now-banner">
      <div class="now-label">Current direction now</div>
      <div class="now-dir ${displayDir}">${arrows[displayDir]} ${labels[displayDir]}</div>
      ${detailText ? `<div class="now-detail">${detailText}</div>` : ''}
    </div>

    <div class="chart-section">
      <div class="chart-title">Tide Heights &mdash; North vs South End</div>
      <div class="chart-wrap"><canvas id="tideChart"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-line" style="background:#4dd0e1"></div>North (Padilla Bay)</div>
        <div class="legend-item"><div class="legend-line" style="background:#ffb74d"></div>South (La Conner)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>North current</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>South current</div>
        <div class="legend-item"><div class="legend-dot" style="background:#42a5f5"></div>Slack</div>
      </div>
    </div>

    <div class="slack-schedule">
      <div class="section-title">Today's Slack Times</div>
      ${slackItems || '<div style="color:#5a8a9a; font-size:0.8rem;">No slack transitions today</div>'}
    </div>

    <div class="method-section">
      <div class="section-title">How This Works</div>
      <p>The Swinomish Channel connects <strong>Padilla Bay</strong> (north) to <strong>Skagit Bay</strong> (south).
      Current flows from whichever end has higher water toward the lower end.</p>
      <p>This tool computes the <strong>hydraulic head</strong> &mdash; the water-level difference between
      NOAA station 9448682 (north) and 9448558 (south). When the head crosses zero, that's slack water.
      The sign tells you which way the current flows.</p>
      <p>This is more accurate than single-station offset rules, but still doesn't account for
      Skagit River discharge, wind, or barometric pressure.</p>
    </div>

    <div class="note">
      <strong style="color:#ef9a9a;">NOT FOR NAVIGATION.</strong> This tool is an informal estimate only &mdash; not an official source and not affiliated with
      NOAA, the Coast Guard, or the Port of Skagit. Current direction is modeled from the hydraulic head between two NOAA
      tide prediction stations and may be wrong due to river runoff, wind, or other conditions. Always verify with local
      observation and use official NOAA data for navigation decisions.<br><br>
      North: <a href="https://tidesandcurrents.noaa.gov/noaatidepredictions.html?id=9448682" target="_blank">NOAA 9448682</a> &middot;
      South: <a href="https://tidesandcurrents.noaa.gov/noaatidepredictions.html?id=9448558" target="_blank">NOAA 9448558</a>
    </div>
  `;

  const colorRGB = { north: [76,175,80], south: [239,83,80], slack: [66,165,245] };

  new Chart(document.getElementById('tideChart').getContext('2d'), {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'North (Padilla Bay)',
          data: todayNorth,
          borderColor: '#4dd0e1',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0.4
        },
        {
          label: 'South (La Conner)',
          data: todaySouth,
          borderColor: '#ffb74d',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0.4
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: true,
          displayColors: true,
          backgroundColor: 'rgba(12,30,46,0.9)',
          borderColor: '#1b3d55',
          borderWidth: 1,
          titleFont: { size: 12 },
          bodyFont: { size: 12 },
          callbacks: {
            title: items => fmtTime(items[0].parsed.x),
            label: item => {
              const name = item.datasetIndex === 0 ? 'North' : 'South';
              return `${name}: ${item.parsed.y.toFixed(1)} ft`;
            },
            afterBody: items => {
              const t = items[0].parsed.x;
              const h = headAt(t, headCurve);
              const absH = Math.abs(h);
              if (absH < SLACK_THRESHOLD) return 'Slack water';
              const dir = h > 0 ? 'South ebb' : 'North flood';
              return `${dir} (head: ${h > 0 ? '+' : ''}${h.toFixed(2)} ft)`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear', min: dsMs, max: deMs,
          ticks: { color: '#4a7a8a', maxTicksLimit: 9, font: { size: 11 },
                   callback: v => fmtTime(v) },
          grid: { color: '#0f2030' }
        },
        y: {
          ticks: { color: '#4a7a8a', font: { size: 11 },
                   callback: v => v.toFixed(0) + ' ft' },
          grid: { color: '#0f2030' }
        }
      }
    },
    plugins: [{
      id: 'headBands',
      beforeDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom }, scales: { x } } = chart;
        const step = 6 * 60000;
        for (let t = dsMs; t <= deMs; t += step) {
          const h = headAt(t, headCurve);
          const absH = Math.abs(h);
          const x1 = x.getPixelForValue(t);
          const x2 = x.getPixelForValue(t + step);
          const w = x2 - x1 + 0.5;

          if (absH <= SLACK_THRESHOLD) {
            const s = colorRGB.slack;
            ctx.fillStyle = `rgba(${s[0]},${s[1]},${s[2]},${BAND_ALPHA * 0.6})`;
            ctx.fillRect(x1, top, w, bottom - top);
          } else if (absH <= TRANSITION_ZONE) {
            const blend = (absH - SLACK_THRESHOLD) / (TRANSITION_ZONE - SLACK_THRESHOLD);
            const dir = h > 0 ? 'south' : 'north';
            const dc = colorRGB[dir];
            const sc = colorRGB.slack;
            ctx.fillStyle = `rgba(${dc[0]},${dc[1]},${dc[2]},${BAND_ALPHA * blend})`;
            ctx.fillRect(x1, top, w, bottom - top);
            ctx.fillStyle = `rgba(${sc[0]},${sc[1]},${sc[2]},${BAND_ALPHA * 0.6 * (1 - blend)})`;
            ctx.fillRect(x1, top, w, bottom - top);
          } else {
            const dir = h > 0 ? 'south' : 'north';
            const dc = colorRGB[dir];
            const intensity = Math.min(1, absH / (TRANSITION_ZONE * 3));
            ctx.fillStyle = `rgba(${dc[0]},${dc[1]},${dc[2]},${BAND_ALPHA * (0.5 + 0.5 * intensity)})`;
            ctx.fillRect(x1, top, w, bottom - top);
          }
        }
      }
    }, {
      id: 'slackLines',
      afterDraw(chart) {
        const { ctx, chartArea: { top, bottom }, scales: { x, y } } = chart;

        for (const s of todaySlacks) {
          const px = x.getPixelForValue(s.time);
          ctx.save();
          ctx.strokeStyle = 'rgba(66,165,245,0.5)';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(px, top); ctx.lineTo(px, bottom); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = '#42a5f5';
          ctx.font = '9px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('slack', px, top - 4);
          ctx.restore();
        }

        const nx = x.getPixelForValue(now);
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath(); ctx.moveTo(nx, top); ctx.lineTo(nx, bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ddd';
        ctx.font = '9px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Now', nx, top - 4);
        ctx.restore();
      }
    }]
  });
}

(async () => {
  try {
    const [north6minRaw, southHiLoRaw] = await Promise.all([
      fetchNOAA(NORTH_STATION, '6'),
      fetchNOAA(SOUTH_STATION, 'hilo')
    ]);

    const northCurve = north6minRaw.map(p => ({ x: parseT(p.t), y: parseFloat(p.v) }));
    const timePoints = northCurve.map(p => p.x);
    const southCurve = cosineInterp(southHiLoRaw, timePoints);

    const validNorth = [], validSouth = [];
    for (let i = 0; i < northCurve.length; i++) {
      if (southCurve[i]) {
        validNorth.push(northCurve[i]);
        validSouth.push(southCurve[i]);
      }
    }

    const headCurve = computeHead(validNorth, validSouth);
    const slacks = findSlacks(headCurve);

    render(validNorth, validSouth, headCurve, slacks);
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<p class="error">Failed to load tide data.<br>${err.message}<br><br>
       <a href="." style="color:#42a5f5">Try again</a></p>`;
  }
})();
</script>
</body>
</html>
